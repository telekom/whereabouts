# DEPRECATED: This standalone node-slice controller is superseded by the
# whereabouts-operator (see operator-install.yaml). The operator handles
# node-slice management alongside IP reconciliation and webhooks.
#
# Don't forget to update deployment/whereabouts-chart/templates/node-slice-controller.yaml as well
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whereabouts-controller
  namespace: kube-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whereabouts-controller
  template:
    metadata:
      labels:
        app: whereabouts-controller
    spec:
      containers:
        - command:
            - /node-slice-controller
          env:
            - name: NODENAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: spec.nodeName
            - name: WHEREABOUTS_NAMESPACE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
          image: ghcr.io/telekom/whereabouts:latest
          name: whereabouts
          resources:
            limits:
              cpu: 100m
              memory: 200Mi
            requests:
              cpu: 100m
              memory: 100Mi
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
            - mountPath: /host/opt/cni/bin
              name: cnibin
            - mountPath: /host/etc/cni/net.d
              name: cni-net-dir
            - mountPath: /cron-schedule
              name: cron-scheduler-configmap
      preemptionPolicy: PreemptLowerPriority
      priority: 0
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      serviceAccount: whereabouts
      serviceAccountName: whereabouts
      terminationGracePeriodSeconds: 30
      volumes:
        - hostPath:
            path: /opt/cni/bin
            type: ""
          name: cnibin
        - hostPath:
            path: /etc/cni/net.d
            type: ""
          name: cni-net-dir
        - configMap:
            defaultMode: 484
            items:
              - key: cron-expression
                path: config
            name: whereabouts-config
          name: cron-scheduler-configmap