# Default kustomization — combines all components for deployment.
# This project uses OPA cert-controller for TLS rotation instead of cert-manager.
# Webhook TLS is managed by the controller's embedded certrotator.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kube-system
namePrefix: whereabouts-
resources:
- ../crd
- ../rbac
- ../manager
- ../webhook
- ../daemonset
configurations:
- kustomizeconfig.yaml
vars:
- name: WHEREABOUTS_KUSTOMIZE_NAMESPACE
  objref:
    apiVersion: v1
    kind: Service
    name: whereabouts-webhook-service
  fieldref:
    fieldpath: metadata.namespace
