name: Binaries upload release
on:
  release:
    types:
      - created

permissions:
  contents: read

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        arch: [amd64, arm64, arm]
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
    - name: Install Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod
    - name: Build binaries
      env:
        GOARCH: ${{ matrix.arch }}
      run: |
        make build
        mv ./bin/whereabouts ./bin/whereabouts-${{ matrix.arch }}
        mv ./bin/whereabouts-operator ./bin/whereabouts-operator-${{ matrix.arch }}
        cd ./bin
        sha256sum whereabouts-${{ matrix.arch }} > whereabouts-${{ matrix.arch }}.sha256
        sha256sum whereabouts-operator-${{ matrix.arch }} > whereabouts-operator-${{ matrix.arch }}.sha256
    - name: Upload release binaries
      uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
      with:
        files: |
          ./bin/whereabouts-${{ matrix.arch }}
          ./bin/whereabouts-${{ matrix.arch }}.sha256
          ./bin/whereabouts-operator-${{ matrix.arch }}
          ./bin/whereabouts-operator-${{ matrix.arch }}.sha256
        tag_name: ${{ github.event.release.tag_name }}
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload-manifests:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
    - name: Install Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod
    - name: Prepare manifests
      run: |
        mkdir -p ./manifests
        TAG="${{ github.event.release.tag_name }}"
        make kustomize
        bin/kustomize build config/default | \
          sed "s|ghcr.io/telekom/whereabouts:[^ \"]*|ghcr.io/telekom/whereabouts:${TAG}|g" \
          > ./manifests/install.yaml
    - name: Upload install manifests
      uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
      with:
        files: |
          ./manifests/*.yaml
        tag_name: ${{ github.event.release.tag_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
