# Webhook kustomization
# manifests.yaml is generated by controller-gen from webhook markers.
# Do not edit manifests.yaml manually — run `make manifests` to regenerate.
#
# NOTE: The service account names in the CEL matchConditions below are derived
# from the base SA names (cni, whereabouts-operator) with the namePrefix
# "whereabouts-" applied by config/default/kustomization.yaml. The namespace is
# resolved from the rendered webhook Service so overlays can change it.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- manifests.yaml
- service.yaml
patches:
# Inject cert-controller CA injection annotation and CEL matchConditions
# to bypass validation for the CNI plugin ServiceAccount.
- target:
    group: admissionregistration.k8s.io
    version: v1
    kind: ValidatingWebhookConfiguration
  patch: |-
    apiVersion: admissionregistration.k8s.io/v1
    kind: ValidatingWebhookConfiguration
    metadata:
      name: validating-webhook-configuration
      annotations:
        cert-controller.cert-rotation/inject-ca-from: $(WHEREABOUTS_KUSTOMIZE_NAMESPACE)/whereabouts-webhook-cert
    webhooks:
    - name: vippool.whereabouts.cni.cncf.io
      matchConditions:
      - name: bypass-cni-plugin
        expression: >-
          !(request.userInfo.username == "system:serviceaccount:$(WHEREABOUTS_KUSTOMIZE_NAMESPACE):whereabouts-cni")
          && !(request.userInfo.username == "system:serviceaccount:$(WHEREABOUTS_KUSTOMIZE_NAMESPACE):whereabouts-whereabouts-operator")
    - name: vnodeslicepool.whereabouts.cni.cncf.io
      matchConditions:
      - name: bypass-cni-plugin
        expression: >-
          !(request.userInfo.username == "system:serviceaccount:$(WHEREABOUTS_KUSTOMIZE_NAMESPACE):whereabouts-cni")
          && !(request.userInfo.username == "system:serviceaccount:$(WHEREABOUTS_KUSTOMIZE_NAMESPACE):whereabouts-whereabouts-operator")
    - name: voverlappingrangeipreservation.whereabouts.cni.cncf.io
      matchConditions:
      - name: bypass-cni-plugin
        expression: >-
          !(request.userInfo.username == "system:serviceaccount:$(WHEREABOUTS_KUSTOMIZE_NAMESPACE):whereabouts-cni")
          && !(request.userInfo.username == "system:serviceaccount:$(WHEREABOUTS_KUSTOMIZE_NAMESPACE):whereabouts-whereabouts-operator")
