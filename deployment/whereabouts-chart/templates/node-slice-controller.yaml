# Dont'forget to update doc/crds/node-slice-controller.yaml as well
{{- if .Values.nodeSliceController.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "whereabouts.fullname" . }}-controller
  {{- include "whereabouts.namespace" . | nindent 2 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "whereabouts.fullname" . }}-controller
  template:
    metadata:
      labels:
        app: {{ include "whereabouts.fullname" . }}-controller
    spec:
      {{- with .Values.nodeSliceController.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      containers:
        - command:
            - /whereabouts-operator
            - controller
            - --leader-elect=true
          env:
            - name: NODENAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: spec.nodeName
            - name: WHEREABOUTS_NAMESPACE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          name: whereabouts
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
            - mountPath: /host/opt/cni/bin
              name: cnibin
            - mountPath: /host/etc/cni/net.d
              name: cni-net-dir
            - mountPath: /cron-schedule
              name: cron-scheduler-configmap
      preemptionPolicy: PreemptLowerPriority
      priority: 0
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      serviceAccount: {{ include "whereabouts.serviceAccountName" . }}
      serviceAccountName: {{ include "whereabouts.serviceAccountName" . }}
      terminationGracePeriodSeconds: 30
      volumes:
        - hostPath:
            path: /opt/cni/bin
            type: ""
          name: cnibin
        - hostPath:
            path: /etc/cni/net.d
            type: ""
          name: cni-net-dir
        - configMap:
            defaultMode: 484
            items:
              - key: cron-expression
                path: config
            name: {{ include "whereabouts.fullname" . }}-config
          name: cron-scheduler-configmap
{{- end}}
