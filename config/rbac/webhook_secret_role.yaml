# Namespaced webhook TLS Secret permissions. Keep this out of the generated
# ClusterRole so secret list/watch cannot read secrets cluster-wide.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: whereabouts-operator-webhook-secret
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - create
  - list
  - watch
- apiGroups:
  - ""
  resourceNames:
  - whereabouts-webhook-cert
  resources:
  - secrets
  verbs:
  - get
  - patch
  - update
