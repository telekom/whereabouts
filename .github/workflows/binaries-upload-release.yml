name: Binaries upload release
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        arch: [amd64, arm64, arm]
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Install Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version-file: go.mod
    - name: Build binaries
      env:
        GOARCH: ${{ matrix.arch }}
      run: |
        make build
        mv ./bin/whereabouts ./bin/whereabouts-${{ matrix.arch }}
        mv ./bin/whereabouts-operator ./bin/whereabouts-operator-${{ matrix.arch }}
        mv ./bin/install-cni ./bin/install-cni-${{ matrix.arch }}
        cd ./bin
        sha256sum whereabouts-${{ matrix.arch }} > whereabouts-${{ matrix.arch }}.sha256
        sha256sum whereabouts-operator-${{ matrix.arch }} > whereabouts-operator-${{ matrix.arch }}.sha256
        sha256sum install-cni-${{ matrix.arch }} > install-cni-${{ matrix.arch }}.sha256
    - name: Upload release binaries
      uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
      with:
        files: |
          ./bin/whereabouts-${{ matrix.arch }}
          ./bin/whereabouts-${{ matrix.arch }}.sha256
          ./bin/whereabouts-operator-${{ matrix.arch }}
          ./bin/whereabouts-operator-${{ matrix.arch }}.sha256
          ./bin/install-cni-${{ matrix.arch }}
          ./bin/install-cni-${{ matrix.arch }}.sha256
        tag_name: ${{ github.ref_name }}
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload-manifests:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Install Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version-file: go.mod
    - name: Prepare manifests
      env:
        TAG: ${{ github.ref_name }}
      run: |
        bash hack/release/validate-tag.sh "${TAG}"
        mkdir -p ./manifests
        make kustomize
        bin/kustomize build config/default | \
          sed "s|ghcr.io/telekom/whereabouts:[^ \"]*|ghcr.io/telekom/whereabouts:${TAG}|g" \
          > ./manifests/install.yaml
        if grep -R 'ghcr.io/telekom/whereabouts:latest' ./manifests; then
          echo "release manifests must not reference :latest" >&2
          exit 1
        fi
        if ! grep -R "ghcr.io/telekom/whereabouts:${TAG}" ./manifests; then
          echo "release manifests did not reference ${TAG}" >&2
          exit 1
        fi
    - name: Upload install manifests
      uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
      with:
        files: |
          ./manifests/*.yaml
        tag_name: ${{ github.ref_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
