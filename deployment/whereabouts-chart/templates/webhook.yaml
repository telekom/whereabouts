{{- if .Values.webhook.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "whereabouts.fullname" . }}-webhook
  {{- include "whereabouts.namespace" . | nindent 2 }}
  labels:
    {{- include "whereabouts.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.webhook.replicas | default 2 }}
  selector:
    matchLabels:
      app: {{ include "whereabouts.fullname" . }}-webhook
  template:
    metadata:
      labels:
        app: {{ include "whereabouts.fullname" . }}-webhook
    spec:
      serviceAccountName: {{ include "whereabouts.fullname" . }}-webhook
      containers:
      - name: webhook
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command:
        - /whereabouts-operator
        - webhook
        - --namespace={{ .Values.namespaceOverride | default .Release.Namespace }}
        - --metrics-bind-address=:8082
        - --health-probe-bind-address=:8083
        ports:
        - containerPort: 9443
          name: webhook
          protocol: TCP
        - containerPort: 8082
          name: metrics
          protocol: TCP
        - containerPort: 8083
          name: healthz
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8083
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8083
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          {{- toYaml .Values.webhook.resources | nindent 10 }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65532
          runAsGroup: 65532
          capabilities:
            drop: [ALL]
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
        - name: cert
          mountPath: /tmp/k8s-webhook-server/serving-certs
          readOnly: true
      volumes:
      - name: cert
        secret:
          secretName: {{ include "whereabouts.fullname" . }}-webhook-cert
          optional: true
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
