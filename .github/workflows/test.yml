      - name: Install requirements
        run: sudo apt-get install nmap jq && make build

      - name: Get tools, setup KinD cluster with Helm
        run: source hack/e2e-get-test-tools.sh && ./hack/e2e-setup-kind-cluster-helm.sh --number-of-compute $NUMBER_OF_COMPUTE_NODES

      - name: Clear test-cache
        run: go clean -testcache

      - name: Wait for operator to be ready
        run: |
          kubectl -n kube-system wait --for=condition=ready -l control-plane=controller-manager pod --timeout=120s

      - name: Execute E2E tests
        env:
          KUBECONFIG: /home/runner/.kube/config
          NUMBER_OF_THRASH_ITER: 5
          FILL_PERCENT_CAPACITY: 20
