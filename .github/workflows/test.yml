on: 
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "doc/*.{json,png,svg}"
  push: 
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "doc/*.{json,png,svg}"

name: Test

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Install Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version-file: go.mod

    - name: Run Revive Action by building from repository
      uses: morphy2k/revive-action@bd8016177e3722fe0aad85e22507805641be5bb1 # v2.7.8
      with:
        exclude: "./vendor/..."

    - name: Install kubebuilder tools
      run: ./hack/install-kubebuilder-tools.sh

    - name: Generate code
      run: ./hack/generate-code.sh && hack/verify-codegen.sh

    - name: Run go fmt
      run: go fmt ./...
      #run: diff -u <(echo -n) <(gofmt -d -s .)

    - name: Test
      run: sudo PATH=${PATH}:./bin ./hack/test-go.sh

    - name: Send coverage
      uses: shogo82148/actions-goveralls@25f5320d970fb565100cf1993ada29be1bb196a1 # v1.10.0
      with:
        path-to-profile: coverage.out
      env:
        KUBEBUILDER_ASSETS: ${{ github.workspace }}/bin

  e2e:
    name: "e2e / ${{ matrix.suite }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: standard
            test-args: "$(go list ./... | grep -v /e2e_node_slice)"
          - suite: node-slice
            test-args: "./e2e_node_slice/..."
    env:
      NUMBER_OF_COMPUTE_NODES: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Install requirements
        run: sudo apt-get install nmap jq && ./hack/build-go.sh

      - name: Get tools, setup KinD cluster test environment
        run: source hack/e2e-get-test-tools.sh && ./hack/e2e-setup-kind-cluster.sh --number-of-compute $NUMBER_OF_COMPUTE_NODES

      - name: Clear test-cache
        run: go clean -testcache

      - name: Execute E2E tests
        env:
          KUBECONFIG: /home/runner/.kube/config
          NUMBER_OF_THRASH_ITER: 20
          FILL_PERCENT_CAPACITY: 20
        run: pushd e2e; go test -v ${{ matrix.test-args }} -timeout 1h; popd
