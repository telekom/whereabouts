# Whereabouts Operator Deployment
# Replaces the ip-control-loop process from the DaemonSet with a proper
# controller-runtime operator (Deployment + leader election).
#
# The DaemonSet still handles CNI binary install + token watcher.
# The operator handles IP reconciliation, node-slice management, and webhooks.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: whereabouts-operator
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: whereabouts-operator
rules:
# IPPool CRUD for reconciliation
- apiGroups: [whereabouts.cni.cncf.io]
  resources: [ippools]
  verbs: [get, list, watch, update, patch]
# NodeSlicePool CRUD for node-slice management
- apiGroups: [whereabouts.cni.cncf.io]
  resources: [nodeslicepools]
  verbs: [get, list, watch, create, update, patch, delete]
# NodeSlicePool status subresource
- apiGroups: [whereabouts.cni.cncf.io]
  resources: [nodeslicepools/status]
  verbs: [get, update, patch]
# OverlappingRangeIPReservation for cleanup
- apiGroups: [whereabouts.cni.cncf.io]
  resources: [overlappingrangeipreservations]
  verbs: [get, list, watch, delete]
# Pods for orphan detection
- apiGroups: [""]
  resources: [pods]
  verbs: [get, list, watch]
# Nodes for node-slice assignment
- apiGroups: [""]
  resources: [nodes]
  verbs: [get, list, watch]
# NADs for node-slice pool configuration
- apiGroups: [k8s.cni.cncf.io]
  resources: [network-attachment-definitions]
  verbs: [get, list, watch]
# Leader election
- apiGroups: [coordination.k8s.io]
  resources: [leases]
  verbs: [get, create, update, delete]
# Events
- apiGroups: ["", events.k8s.io]
  resources: [events]
  verbs: [create, patch, update, get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: whereabouts-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: whereabouts-operator
subjects:
- kind: ServiceAccount
  name: whereabouts-operator
  namespace: kube-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whereabouts-operator
  namespace: kube-system
  labels:
    app: whereabouts-operator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: whereabouts-operator
  template:
    metadata:
      labels:
        app: whereabouts-operator
    spec:
      serviceAccountName: whereabouts-operator
      containers:
      - name: controller
        image: ghcr.io/telekom/whereabouts:latest
        command:
        - /whereabouts-operator
        - controller
        - --leader-elect=true
        - --leader-elect-namespace=kube-system
        - --metrics-bind-address=:8080
        - --health-probe-bind-address=:8081
        - --reconcile-interval=30s
        ports:
        - containerPort: 8080
          name: metrics
          protocol: TCP
        - containerPort: 8081
          name: healthz
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
