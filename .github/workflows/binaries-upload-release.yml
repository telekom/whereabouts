name: Binaries upload release
on:
  release:
    types:
      - created

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64, arm]
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Install Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version-file: go.mod
    - name: Build whereabouts binary
      env:
        GOARCH: ${{ matrix.arch }}
      run: |
        ./hack/build-go.sh
        mv ./bin/whereabouts ./bin/whereabouts-${{ matrix.arch }}
        cd ./bin && sha256sum whereabouts-${{ matrix.arch }} > whereabouts-${{ matrix.arch }}.sha256
    - name: Upload whereabouts binary
      uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
      with:
        files: |
          ./bin/whereabouts-${{ matrix.arch }}
          ./bin/whereabouts-${{ matrix.arch }}.sha256
        tag_name: ${{ github.event.release.tag_name }}
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
