on: 
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "doc/*.{json,png,svg}"
  push: 
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "doc/*.{json,png,svg}"

name: Test

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Install Go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version-file: go.mod

    - name: Run Revive Action by building from repository
      uses: morphy2k/revive-action@bd8016177e3722fe0aad85e22507805641be5bb1 # v2.7.8
      with:
        exclude: "./vendor/..."

    - name: Verify generated API artifacts
      run: make verify-generate-api

    - name: Verify Helm webhook failurePolicy
      run: make verify-helm-webhook-failurepolicy

    - name: Verify Helm webhook ServiceAccount bypass
      run: make verify-helm-webhook-bypass-serviceaccount

    - name: Verify Helm service CIDRs
      run: make verify-helm-service-cidrs

    - name: Verify Helm imagePullSecrets
      run: make verify-helm-imagepullsecrets

    - name: Verify go fmt
      run: |
        go fmt ./...
        git diff --exit-code -- '*.go'

    - name: Test
      run: make test

    - name: Send coverage
      uses: shogo82148/actions-goveralls@9606dbc5ac5cf888a0e9ef901515c3cd516a2790 # v1.11.0
      with:
        path-to-profile: coverage.out

  e2e:
    name: "e2e / ${{ matrix.suite }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: core-basic
            test-dir: e2e
            test-pkg: "."
            focus: "Single pod tests|Small subnets|Gateway exclusion|L3.Routed|Preferred IP"
          - suite: core-workloads
            test-dir: e2e
            test-pkg: "."
            focus: "ReplicaSet|StatefulSet|Overlapping ranges|Named ranges|Optimistic IPAM"
          - suite: core-lifecycle
            test-dir: e2e
            test-pkg: "."
            focus: "Pod cleanup|Node drain|Reconciler cleanup|Operator restart recovery"
          - suite: node-loss
            test-dir: e2e
            test-pkg: "."
            focus: "Node loss"
          - suite: v4
            test-dir: e2e
            test-pkg: "."
            focus: "across address families.*IPv4"
          - suite: v6
            test-dir: e2e
            test-pkg: "."
            focus: "IPv6"
          - suite: dualstack-ext
            test-dir: e2e
            test-pkg: "."
            focus: "DS:|Multi-pool:|Failure:"
          - suite: edge-cases
            test-dir: e2e
            test-pkg: "."
            focus: "Edge:"
          - suite: node-slice
            test-dir: e2e
            test-pkg: "./e2e_node_slice/..."
            focus: ""
    env:
      NUMBER_OF_COMPUTE_NODES: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Install requirements
        run: sudo apt-get install nmap jq && make build

      - name: Get tools, setup KinD cluster test environment
        run: source hack/e2e-get-test-tools.sh && ./hack/e2e-setup-kind-cluster.sh --number-of-compute $NUMBER_OF_COMPUTE_NODES

      - name: Clear test-cache
        run: go clean -testcache

      - name: Wait for operator to be ready
        run: |
          kubectl -n kube-system rollout status deployment whereabouts-controller-manager --timeout=300s
          kubectl -n kube-system wait --for=condition=ready -l control-plane=controller-manager pod --timeout=300s

      - name: Execute E2E tests
        env:
          KUBECONFIG: /home/runner/.kube/config
          NUMBER_OF_THRASH_ITER: 5
          FILL_PERCENT_CAPACITY: 20
        run: |
          cd ${{ matrix.test-dir }}
          if [ -n "${{ matrix.focus }}" ]; then
            go test -v ${{ matrix.test-pkg }} -timeout 1h -ginkgo.focus="${{ matrix.focus }}"
          else
            go test -v ${{ matrix.test-pkg }} -timeout 1h
          fi

      - name: Collect cluster diagnostics
        if: failure()
        run: hack/e2e-collect-diagnostics.sh /tmp/e2e-diagnostics

      - name: Upload cluster diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-diagnostics-${{ matrix.suite }}
          path: /tmp/e2e-diagnostics/
          if-no-files-found: warn
          retention-days: 30

  e2e-helm:
    name: "e2e-helm / ${{ matrix.suite }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: core-basic
            test-dir: e2e
            test-pkg: "."
            focus: "Single pod tests|Small subnets|Gateway exclusion|L3.Routed|Preferred IP"
          - suite: core-workloads
            test-dir: e2e
            test-pkg: "."
            focus: "ReplicaSet|StatefulSet|Overlapping ranges|Named ranges|Optimistic IPAM"
          - suite: core-lifecycle
            test-dir: e2e
            test-pkg: "."
            focus: "Pod cleanup|Node drain|Reconciler cleanup"
          - suite: v4
            test-dir: e2e
            test-pkg: "."
            focus: "across address families.*IPv4"
          - suite: v6
            test-dir: e2e
            test-pkg: "."
            focus: "IPv6"
          - suite: dualstack-ext
            test-dir: e2e
            test-pkg: "."
            focus: "DS:|Multi-pool:|Failure:"
    env:
      NUMBER_OF_COMPUTE_NODES: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Install requirements
        run: sudo apt-get install nmap jq && make build

      - name: Get tools, setup KinD cluster with Helm
        run: source hack/e2e-get-test-tools.sh && ./hack/e2e-setup-kind-cluster-helm.sh --number-of-compute $NUMBER_OF_COMPUTE_NODES

      - name: Clear test-cache
        run: go clean -testcache

      - name: Wait for operator to be ready
        run: |
          kubectl -n kube-system wait --for=condition=ready -l control-plane=controller-manager pod --timeout=300s

      - name: Execute E2E tests
        env:
          KUBECONFIG: /home/runner/.kube/config
          NUMBER_OF_THRASH_ITER: 5
          FILL_PERCENT_CAPACITY: 20
        run: |
          cd ${{ matrix.test-dir }}
          if [ -n "${{ matrix.focus }}" ]; then
            go test -v ${{ matrix.test-pkg }} -timeout 1h -ginkgo.focus="${{ matrix.focus }}"
          else
            go test -v ${{ matrix.test-pkg }} -timeout 1h
          fi

      - name: Collect cluster diagnostics
        if: failure()
        run: hack/e2e-collect-diagnostics.sh /tmp/e2e-diagnostics

      - name: Upload cluster diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-helm-diagnostics-${{ matrix.suite }}
          path: /tmp/e2e-diagnostics/
          if-no-files-found: warn
          retention-days: 30
