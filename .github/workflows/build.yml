on: [push, pull_request]
name: Build

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        goarch: [amd64, arm64]
        os: [linux] 
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Install Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version-file: go.mod

    - name: Install kubebuilder tools
      run: ./hack/install-kubebuilder-tools.sh

    - name: Generate code
      run: ./hack/generate-code.sh

    - name: Build
      env:
        GOARCH: ${{ matrix.goarch }}
        GOOS: ${{ matrix.os }}
      run: ./hack/build-go.sh

  helm-lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up Helm
      uses: azure/setup-helm@1a275c34595e6f69e83254d0f459e5877e0beef1 # v4.3.1

    - name: Lint Helm chart
      run: helm lint deployment/whereabouts-chart
