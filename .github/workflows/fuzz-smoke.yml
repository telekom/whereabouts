name: Fuzz Smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  go-fuzz-smoke:
    name: Go fuzz smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Run fuzz seed corpus
        run: go test -run='Fuzz' ./pkg/config ./pkg/iphelpers
      - name: Fuzz config parsing
        run: |
          go test -run='^$' -fuzz=FuzzLoadIPAMConfiguration -fuzztime=5s ./pkg/config
          go test -run='^$' -fuzz=FuzzParsePrevResult -fuzztime=5s ./pkg/config
      - name: Fuzz CIDR parsing
        run: go test -run='^$' -fuzz=FuzzCIDRParsing -fuzztime=5s ./pkg/iphelpers
