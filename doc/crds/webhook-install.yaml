# Whereabouts Webhook Server Deployment
# Runs the validating webhook server with cert-controller for automatic
# TLS certificate management.
#
# Requires the operator-install.yaml ServiceAccount, or create a dedicated one.
# The webhook server validates IPPool, NodeSlicePool, and OverlappingRangeIPReservation CRDs.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: whereabouts-webhook
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: whereabouts-webhook
rules:
# cert-controller needs secret management for TLS certs
- apiGroups: [""]
  resources: [secrets]
  verbs: [get, list, watch, create, update, patch]
# cert-controller updates webhook configurations with CA bundle
- apiGroups: [admissionregistration.k8s.io]
  resources: [validatingwebhookconfigurations]
  verbs: [get, list, watch, update, patch]
# Events for cert rotation
- apiGroups: ["", events.k8s.io]
  resources: [events]
  verbs: [create, patch, update, get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: whereabouts-webhook
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: whereabouts-webhook
subjects:
- kind: ServiceAccount
  name: whereabouts-webhook
  namespace: kube-system
---
apiVersion: v1
kind: Service
metadata:
  name: whereabouts-webhook
  namespace: kube-system
  labels:
    app: whereabouts-webhook
spec:
  selector:
    app: whereabouts-webhook
  ports:
  - port: 443
    targetPort: 9443
    protocol: TCP
    name: webhook
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whereabouts-webhook
  namespace: kube-system
  labels:
    app: whereabouts-webhook
spec:
  replicas: 2
  selector:
    matchLabels:
      app: whereabouts-webhook
  template:
    metadata:
      labels:
        app: whereabouts-webhook
    spec:
      serviceAccountName: whereabouts-webhook
      containers:
      - name: webhook
        image: ghcr.io/telekom/whereabouts:latest
        command:
        - /whereabouts-operator
        - webhook
        - --namespace=kube-system
        - --metrics-bind-address=:8082
        - --health-probe-bind-address=:8083
        ports:
        - containerPort: 9443
          name: webhook
          protocol: TCP
        - containerPort: 8082
          name: metrics
          protocol: TCP
        - containerPort: 8083
          name: healthz
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8083
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8083
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65532
          runAsGroup: 65532
          capabilities:
            drop: [ALL]
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
        - name: cert
          mountPath: /tmp/k8s-webhook-server/serving-certs
          readOnly: true
      volumes:
      - name: cert
        secret:
          secretName: whereabouts-webhook-cert
          optional: true
